services:
  miro:
    image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME}
    # hostname: miro  # Not set up as breaks MDK setup.bash
    privileged: true
    network_mode: host
    tty: true
    stdin_open: true
    restart: unless-stopped

    env_file:
      - .env

    runtime: nvidia
    environment:
      DISPLAY: ${DISPLAY}
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "all"
      GDK_BACKEND: "x11"
      GDK_DISABLE_XSHM: "1"
      QT_X11_NO_MITSHM: "1"
      OPENCV_VIDEOIO_MSMF_DISABLE: "1"
      OPENCV_VIDEOIO_X11_NO_SHM: "1"

    volumes:
      # X11 forwarding
      - ${X11UNIX}:${X11UNIX}:rw
      - ${XAUTH}:${XAUTH}:rw
      # Audio (PulseAudio)
      - ${PULSE_SOCKET}:${PULSE_SOCKET}:rw
      - ${PULSE_COOKIE_PATH}:/root/.config/pulse/cookie:ro
      # XDG runtime (for sound/video sockets)
      - /run/user/${USER_UID}:/run/user/${USER_UID}
      # MiRo catkin workspace
      - mdpv:/root/mdk/catkin_ws/src

    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    command: bash
volumes:
  mdpv:
